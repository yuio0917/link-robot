<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" font-family="sans-serif">
  <!-- Background -->
  <rect width="700" height="520" fill="white"/>

  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">5-Bar Linkage Inverse Kinematics</text>

  <!-- Base line (ground) -->
  <line x1="100" y1="400" x2="350" y2="400" stroke="#888" stroke-width="3"/>
  <!-- Ground hatching -->
  <g stroke="#888" stroke-width="1">
    <line x1="100" y1="400" x2="85" y2="415"/>
    <line x1="120" y1="400" x2="105" y2="415"/>
    <line x1="140" y1="400" x2="125" y2="415"/>
    <line x1="160" y1="400" x2="145" y2="415"/>
    <line x1="180" y1="400" x2="165" y2="415"/>
    <line x1="200" y1="400" x2="185" y2="415"/>
    <line x1="220" y1="400" x2="205" y2="415"/>
    <line x1="240" y1="400" x2="225" y2="415"/>
    <line x1="260" y1="400" x2="245" y2="415"/>
    <line x1="280" y1="400" x2="265" y2="415"/>
    <line x1="300" y1="400" x2="285" y2="415"/>
    <line x1="320" y1="400" x2="305" y2="415"/>
    <line x1="340" y1="400" x2="325" y2="415"/>
  </g>

  <!-- l1 (base distance between motors) -->
  <line x1="130" y1="400" x2="320" y2="400" stroke="#333" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="225" y="435" text-anchor="middle" font-size="16" fill="#333" font-weight="bold">l1 = 60mm</text>

  <!-- Joint1 (Left Motor) -->
  <circle cx="130" cy="400" r="10" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
  <text x="130" y="465" text-anchor="middle" font-size="14" fill="#E74C3C" font-weight="bold">Motor1</text>
  <text x="130" y="482" text-anchor="middle" font-size="13" fill="#E74C3C">(Joint1)</text>

  <!-- Joint2 (Right Motor) -->
  <circle cx="320" cy="400" r="10" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
  <text x="320" y="465" text-anchor="middle" font-size="14" fill="#E74C3C" font-weight="bold">Motor2</text>
  <text x="320" y="482" text-anchor="middle" font-size="13" fill="#E74C3C">(Joint2)</text>

  <!-- Left arm: l2 link (Joint1 -> Joint3) -->
  <line x1="130" y1="400" x2="200" y2="210" stroke="#2980B9" stroke-width="4" stroke-linecap="round"/>
  <!-- Joint3 (Left Elbow) -->
  <circle cx="200" cy="210" r="7" fill="#2980B9" stroke="#1A5276" stroke-width="2"/>
  <text x="145" y="295" text-anchor="middle" font-size="16" fill="#2980B9" font-weight="bold" transform="rotate(-70, 145, 295)">l2 = 135mm</text>

  <!-- Right arm: l3 link (Joint2 -> Joint4) -->
  <line x1="320" y1="400" x2="370" y2="230" stroke="#27AE60" stroke-width="4" stroke-linecap="round"/>
  <!-- Joint4 (Right Elbow) -->
  <circle cx="370" cy="230" r="7" fill="#27AE60" stroke="#1E8449" stroke-width="2"/>
  <text x="358" y="310" text-anchor="middle" font-size="16" fill="#27AE60" font-weight="bold" transform="rotate(-75, 358, 310)">l3 = 135mm</text>

  <!-- Left distal: l4 link (Joint3 -> Joint5) -->
  <!-- Direction from Joint3(200,210) to Joint5(320,130): vector (120, -80), length ~144.2 -->
  <line x1="200" y1="210" x2="320" y2="130" stroke="#8E44AD" stroke-width="4" stroke-linecap="round"/>
  <text x="245" y="155" text-anchor="middle" font-size="16" fill="#8E44AD" font-weight="bold">l4 = 85mm</text>

  <!-- Right distal: l5 link (Joint4 -> Joint5) -->
  <line x1="370" y1="230" x2="320" y2="130" stroke="#D35400" stroke-width="4" stroke-linecap="round"/>
  <text x="362" y="170" text-anchor="middle" font-size="16" fill="#D35400" font-weight="bold">l5 = 85mm</text>

  <!-- Joint5 -->
  <circle cx="320" cy="130" r="7" fill="#555" stroke="#333" stroke-width="2"/>
  <text x="305" y="120" text-anchor="end" font-size="13" fill="#555">Joint5</text>

  <!-- Pen extension: l6 (Joint5 -> Pen tip) — same direction as l4 -->
  <!-- l4 direction unit vector: (120/144.2, -80/144.2) = (0.832, -0.555) -->
  <!-- l6 extension: (0.832*50, -0.555*50) ≈ (42, -28) relative to Joint5 -->
  <!-- Pen tip: (320+42, 130-28) = (362, 102) ... scaling for visual: (320+50, 130-33) = (370, 97) -->
  <line x1="320" y1="130" x2="370" y2="97" stroke="#333" stroke-width="3" stroke-linecap="round" stroke-dasharray="8,4"/>
  <text x="360" y="127" font-size="16" fill="#333" font-weight="bold">l6 = 50mm</text>

  <!-- Pen tip -->
  <polygon points="370,97 364,79 376,79" fill="#333"/>
  <circle cx="370" cy="77" r="4" fill="#E74C3C"/>
  <text x="395" y="82" font-size="15" fill="#E74C3C" font-weight="bold">Pen (x, y)</text>

  <!-- Dashed guide line showing l4+l6 are collinear -->
  <line x1="200" y1="210" x2="370" y2="97" stroke="#8E44AD" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- theta1 angle arc -->
  <path d="M 170,400 A 40,40 0 0,0 155,365" fill="none" stroke="#2980B9" stroke-width="2"/>
  <text x="178" y="378" font-size="18" fill="#2980B9" font-weight="bold" font-style="italic">θ1</text>

  <!-- theta2 angle arc -->
  <path d="M 360,400 A 40,40 0 0,0 347,365" fill="none" stroke="#27AE60" stroke-width="2"/>
  <text x="362" y="378" font-size="18" fill="#27AE60" font-weight="bold" font-style="italic">θ2</text>

  <!-- Joint labels -->
  <text x="193" y="235" font-size="13" fill="#2980B9">Joint3</text>
  <text x="380" y="250" font-size="13" fill="#27AE60">Joint4</text>

  <!-- Formula box -->
  <rect x="430" y="130" width="250" height="200" rx="10" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="2"/>
  <text x="555" y="160" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Inverse Kinematics</text>
  <line x1="445" y1="170" x2="665" y2="170" stroke="#DEE2E6" stroke-width="1"/>

  <text x="450" y="195" font-size="13" fill="#555">Input:  Target (x, y)</text>
  <text x="450" y="218" font-size="13" fill="#555">Output: Motor angles (θ1, θ2)</text>

  <line x1="445" y1="230" x2="665" y2="230" stroke="#DEE2E6" stroke-width="1"/>

  <text x="450" y="255" font-size="13" fill="#333" font-weight="bold">Solve:</text>
  <text x="460" y="280" font-size="13" fill="#555">cos(α) = (a² + b² - c²) / 2ab</text>
  <text x="460" y="305" font-size="13" fill="#2980B9">θ1 = acos(...) + atan2(y, x)</text>
  <text x="460" y="325" font-size="13" fill="#27AE60">θ2 = atan2(...) - acos(...)</text>

  <!-- Arrow showing input/output flow -->
  <text x="555" y="375" text-anchor="middle" font-size="13" fill="#888">Target coordinate (x,y)</text>
  <text x="555" y="395" text-anchor="middle" font-size="13" fill="#888">↓</text>
  <text x="555" y="415" text-anchor="middle" font-size="13" fill="#888">Motor angles (θ1, θ2)</text>
</svg>